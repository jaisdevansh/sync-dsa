<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Auto Sync</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">DSA Auto Sync</h1>
      <p class="subtitle">Automatically sync your solutions</p>
    </header>

    <div class="content">
      <!-- Auth Status -->
      <div id="authStatus" class="status-card">
        <div class="status-icon">🔒</div>
        <div class="status-text">
          <div class="status-label">Status</div>
          <div id="statusText" class="status-value">Not connected</div>
        </div>
      </div>

      <!-- Stats -->
      <div id="statsCard" class="stats-card hidden">
        <div class="stat-item">
          <div class="stat-value" id="totalSolved">0</div>
          <div class="stat-label">Total Solved</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-value" id="streak">0</div>
          <div class="stat-label">Streak 🔥</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="connectBtn" class="btn btn-primary">
          CONNECT GITHUB
        </button>
        <button id="dashboardBtn" class="btn btn-secondary hidden">
          VIEW DASHBOARD
        </button>
      </div>

      <!-- Info -->
      <div class="info">
        <p class="info-text">
          Solve problems on LeetCode or GeeksforGeeks to start syncing!
        </p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
