<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>
  
  <!-- Code brackets </> in white -->
  <g fill="white">
    <!-- Left bracket < -->
    <path d="M 28 64 L 42 44 L 48 48 L 38 64 L 48 80 L 42 84 Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Slash / -->
    <rect x="60" y="40" width="8" height="48" rx="4" transform="rotate(15 64 64)"/>
    
    <!-- Right bracket > -->
    <path d="M 100 64 L 86 44 L 80 48 L 90 64 L 80 80 L 86 84 Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  </g>
  
  <!-- Blue code lines (top right) -->
  <g fill="#3B82F6">
    <rect x="72" y="20" width="12" height="4" rx="2"/>
    <rect x="88" y="20" width="24" height="4" rx="2"/>
    <rect x="72" y="28" width="8" height="4" rx="2"/>
    <rect x="84" y="28" width="28" height="4" rx="2"/>
  </g>
  
  <!-- Blue code lines (bottom left) -->
  <g fill="#3B82F6">
    <rect x="16" y="96" width="8" height="4" rx="2"/>
    <rect x="28" y="96" width="20" height="4" rx="2"/>
    <rect x="16" y="104" width="12" height="4" rx="2"/>
    <rect x="32" y="104" width="16" height="4" rx="2"/>
  </g>
  
  <!-- Sync arrows (circular) with lightning bolt -->
  <g>
    <!-- Circular arrows -->
    <path d="M 90 64 A 26 26 0 1 1 90 63.9" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M 90 64 L 96 58 L 96 70 Z" fill="white"/>
    <path d="M 38 64 L 32 58 L 32 70 Z" fill="white"/>
    
    <!-- Lightning bolt in center -->
    <path d="M 68 52 L 60 64 L 66 64 L 60 76 L 68 64 L 62 64 Z" fill="#3B82F6"/>
  </g>
</svg>
