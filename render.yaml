services:
  # Backend API Server
  - type: web
    name: dsa-sync-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run start:backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BACKEND_URL
        value: https://dsa-sync-backend.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false # Set this in Render dashboard for security
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "*"

  # Cron job to keep services alive (runs every minute, pings multiple times)
  - type: cron
    name: keep-services-alive
    runtime: node
    region: oregon
    schedule: "* * * * *"
    buildCommand: echo "No build needed"
    startCommand: |
      for i in 1 2; do
        curl -f https://dsa-sync-backend.onrender.com/health || echo "Backend ping failed"
        sleep 25
      done
    envVars:
      - key: NODE_ENV
        value: production
